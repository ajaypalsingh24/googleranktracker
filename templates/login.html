{% extends "layout.html" %}
{% block title %}Login - Google Rank Tracker{% endblock %}
{% block body %}
  <main class="login">
    <form class="login-panel" action="/login" method="post">
      <p class="eyebrow">Private dashboard</p>
      <h1>Google Rank Tracker</h1>
      <label>
        Password
        <input name="password" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit">Log in</button>
      {% if error %}<p class="form-error">{{ error }}</p>{% endif %}
    </form>
  </main>
{% endblock %}
